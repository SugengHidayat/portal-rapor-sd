<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal e-Rapor Kurikulum Merdeka - Kelas 4 SD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-8 max-w-lg w-full text-center text-white transition-all duration-300 hover:border-white/30">
        
        <div class="mx-auto bg-blue-500/20 w-20 h-20 rounded-2xl flex items-center justify-center border border-blue-400/30 shadow-inner mb-6">
            <svg class="w-12 h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>

        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-200 to-indigo-200 bg-clip-text text-transparent">
            E-RAPOR KURIKULUM MERDEKA
        </h1>
        <p class="text-sm text-slate-300 font-medium tracking-wide uppercase mt-1 mb-8">
            Fase B • Khusus Kelas 4 Sekolah Dasar
        </p>

        <form id="portalForm" class="text-left space-y-5">
            
            <div>
                <label for="sekolah" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Pilih Lembaga Sekolah Dasar
                </label>
                <select id="sekolah" required
                    class="w-full bg-slate-900/60 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent cursor-pointer transition-all appearance-none">
                    <option value="" disabled selected class="text-slate-500">-- Silakan Pilih Sekolah Anda --</option>
                    
                    <option value="SKL01">SDN RANUKLINDUNGAN 1</option>
                    <option value="SKL02">SDN RANUKLINDUNGAN 2</option>
                    <option value="SKL03">SDN GRATITUNON 1</option>
                    <option value="SKL04">SDN KEDAWUNG KULON 1</option>
                    </select>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Kode Akses Ruang Kelas
                </label>
                <input type="password" id="password" required placeholder="••••••"
                    class="w-full bg-slate-900/60 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0 focus:outline-none cursor-pointer mt-2">
                Buka Dashboard e-Rapor
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-xs text-slate-400">
            &copy; 2026 Korwil Bidang Pendidikan Kecamatan • All Rights Reserved
        </div>
    </div>

    <script>
        // MAPPING DATABASE TERPUSAT: Menghubungkan Kode Sekolah ke ID Spreadsheet masing-masing
        // Guru/Operator tidak akan bisa melihat ID ini di browser secara langsung.
        const DATABASE_MAP = {
            "SKL01": {
                nama: "SDN RANUKLINDUNGAN 1",
                dbId: "1oLPWzfTdvLweg0dNGhW_3a3PhC7qJEecHaOsstFCcok", // ID Database lama Anda
                raporId: "12lkZ9LROZc0LIhH86hgOAcW2W6YXNV4avMBXijQphqc", // ID Rapor lama Anda
                pin: "123456" // Kode akses khusus sekolah 1
            },
            "SKL02": {
                nama: "SDN RANUKLINDUNGAN 2",
                dbId: "ID_SPREADSHEET_DB_SEKOLAH_2_DISINI",
                raporId: "ID_SPREADSHEET_RAPOR_SEKOLAH_2_DISINI",
                pin: "234567"
            },
            "SKL03": {
                nama: "SDN GRATITUNON 1",
                dbId: "ID_SPREADSHEET_DB_SEKOLAH_3_DISINI",
                raporId: "ID_SPREADSHEET_RAPOR_SEKOLAH_3_DISINI",
                pin: "345678"
            }
            // Seterusnya teruskan pemetaan hingga 35 sekolah
        };

        document.getElementById('portalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const kodeSekolah = document.getElementById('sekolah').value;
            const inputPin = document.getElementById('password').value;
            
            const sekolahTerpilih = DATABASE_MAP[kodeSekolah];
            
            if (sekolahTerpilih) {
                // Validasi PIN Keamanan
                if (inputPin === sekolahTerpilih.pin) {
                    
                    // Alihkan ke halaman kerja data siswa dengan melempar parameter ID secara terpusat
                    // Gantilah 'data-siswa.html' dengan nama file dashboard kerja Anda.
                    const urlTujuan = `data-siswa.html?dbId=${sekolahTerpilih.dbId}&raporId=${sekolahTerpilih.raporId}&namaSekolah=${encodeURIComponent(sekolahTerpilih.nama)}`;
                    
                    window.location.href = urlTujuan;
                    
                } else {
                    alert('❌ Kode Akses Ruang Kelas salah! Silakan hubungi admin sekolah.');
                }
            } else {
                alert('❌ Silakan pilih lembaga sekolah terlebih dahulu.');
            }
        });
    </script>
</body>
</html>
